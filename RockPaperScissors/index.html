<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <br />
    <div id="keys">
      <button id="rock" onclick="choose(1)">👊</button>
      <button id="paper" onclick="choose(2)">🖐️</button>
      <button id="scissors" onclick="choose(3)">✌️</button>
    </div>
    <br /><br />

    <div id="player">You: <span id="player_choice"></span></div>
    <div id="computer">Computer: <span id="computer_choice"></span></div>

    <div id="display"></div>
    <br /><br />
    <div id="playerScore">You'r score: <span id="player_score">0</span></div>
    <div id="computerScore">
      Computer score: <span id="computer_score">0</span>
    </div>

    <script src="index.js"></script>
  </body>
</html>
